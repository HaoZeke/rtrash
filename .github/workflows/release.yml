# Build a musl release tarball on tag pushes (v*).
# Users can also build the same artifact locally with scripts/package-release.sh.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: package
        env:
          SKIP_TEST: "0"
        run: ./scripts/package-release.sh x86_64-unknown-linux-musl
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtrash-musl
          path: dist/*.tar.gz
      - name: attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
